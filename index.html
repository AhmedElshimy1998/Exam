    const quizContent = document.getElementById('quiz-content');

    quizData.forEach((q, index) => {
        const questionBlock = document.createElement('div');
        questionBlock.className = 'question-block';
        questionBlock.id = `qblock-${index}`;

        const questionText = document.createElement('div');
        questionText.className = 'question-text';
        questionText.innerText = `س${index + 1}: ${q.question}`;
        questionBlock.appendChild(questionText);

        const optionsList = document.createElement('ul');
        optionsList.className = 'options-list';

        q.options.forEach((opt, optIndex) => {
            const li = document.createElement('li');
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `question${index}`;
            radio.value = optIndex;

            radio.addEventListener('change', () => {
                checkAnswer(index, optIndex, q.correctAnswer, q.hint);
            });

            label.appendChild(radio);
            label.appendChild(document.createTextNode(opt));
            li.appendChild(label);
            optionsList.appendChild(li);
        });

        questionBlock.appendChild(optionsList);

        const hintBox = document.createElement('div');
        hintBox.id = `hint-${index}`;
        hintBox.className = 'hint-box';
        questionBlock.appendChild(hintBox);

        quizContent.appendChild(questionBlock);
    });

    function checkAnswer(questionIndex, selectedIndex, correctIndex, hintText) {
        const hintBox = document.getElementById(`hint-${questionIndex}`);
        const radios = document.getElementsByName(`question${questionIndex}`);
        
        for (let radio of radios) {
             radio.disabled = true; // Lock the answer after selection
        }

        hintBox.style.display = 'block';
        
        if (selectedIndex === correctIndex) {
            hintBox.className = 'hint-box hint-correct';
            hintBox.innerText = `إجابة صحيحة! تلميح: ${hintText}`;
        } else {
            hintBox.className = 'hint-box hint-incorrect';
            hintBox.innerText = `إجابة خاطئة. تلميح: ${hintText}`;
        }
    }
